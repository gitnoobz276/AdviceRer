<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdviceRer</title>
<link rel="icon" type="image/png" href="favicon.png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#ffffff,#ffd6d6,#ffb8b8);min-height:100vh}
.container{max-width:800px;margin:40px auto;padding:20px}
.card{background:rgba(255,255,255,.95);padding:40px;border-radius:20px;text-align:center}
input,button{padding:12px;margin:8px 0;width:100%;max-width:320px}
#homepage{display:none;height:100vh}
.sidebar{width:250px;background:#fff;border-right:1px solid #ddd;padding:20px;display:flex;flex-direction:column;justify-content:space-between}
.main{flex:1;padding:40px}
</style>
</head>
<body>

<div id="login-screen" class="container">
  <div class="card">
    <h1>AdviceRer</h1>
    <p>Sign Up For Free!</p><br>

    <button id="googleBtn">Continue with Google</button>

    <p>or</p>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button id="signupBtn">Create Account</button>
  </div>
</div>

<div id="homepage">
  <div style="display:flex;height:100vh">
    <div class="sidebar">
      <div>
        <h2>AdviceRer</h2><br>
        <button id="settingsBtn">Settings</button>
      </div>
      <div id="userInfo">Signed in</div>
    </div>
    <div class="main">
      <h1>AdviceRer</h1>
      <p>Welcome back!</p>
      <br>
      <p>Use the chat button in the corner to start talking.</p>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  createUserWithEmailAndPassword,
  sendEmailVerification,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBe5cznf4e-AMKRX2k7qJpA8ru1S7jPmOk",
  authDomain: "advicerer.firebaseapp.com",
  projectId: "advicerer",
  storageBucket: "advicerer.firebasestorage.app",
  messagingSenderId: "927744916100",
  appId: "1:927744916100:web:ee8412ffe0a8491276e0d1"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

function showHomepage(user){
  document.getElementById("login-screen").style.display="none";
  document.getElementById("homepage").style.display="block";
  document.getElementById("userInfo").textContent =
    user.displayName || user.email || "User";
}

document.getElementById("googleBtn").addEventListener("click", async ()=>{
  const provider = new GoogleAuthProvider();
  const result = await signInWithPopup(auth, provider);
  showHomepage(result.user);
});

document.getElementById("signupBtn").addEventListener("click", async ()=>{
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const cred = await createUserWithEmailAndPassword(auth,email,password);
  await sendEmailVerification(cred.user);

  alert("Verification email sent. Verify your email, then sign in again.");
});

onAuthStateChanged(auth, async (user)=>{
  if(user){
    await user.reload();
    if(user.providerData.some(p=>p.providerId==="google.com") || user.emailVerified){
      showHomepage(user);
    }
  }
});
</script>

<script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>
<script src="https://files.bpcontent.cloud/2026/05/30/04/20260530045144-SCCAU2ZI.js" defer></script>

</body>
</html>
