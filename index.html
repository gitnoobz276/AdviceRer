<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AdviceRer</title>

<!-- Favicon -->
<link rel="icon" type="image/png" href="favicon.png">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    min-height: 100vh;
    background: linear-gradient(
        135deg,
        #ffffff,
        #ffd6d6,
        #ffb8b8
    );
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.container {
    width: 100%;
    max-width: 800px;
}

.card {
    background: rgba(255,255,255,0.9);
    border-radius: 20px;
    padding: 40px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

h1 {
    color: #a00000;
    font-size: 3rem;
    margin-bottom: 10px;
}

.tagline {
    font-size: 1.3rem;
    color: #555;
    margin-bottom: 30px;
}

.description {
    font-size: 1.1rem;
    line-height: 1.7;
    color: #333;
}

.highlight {
    color: #a00000;
    font-weight: bold;
}

.note {
    margin-top: 25px;
    padding: 15px;
    background: #fff3f3;
    border-radius: 12px;
}

footer {
    margin-top: 25px;
    color: #666;
    font-size: 0.9rem;
}

@media (max-width: 600px) {
    h1 {
        font-size: 2.2rem;
    }

    .card {
        padding: 25px;
    }
}
</style>
</head>

<body>

<div id="login-screen" class="container">

```
<div class="card">

    <h1>AdviceRer</h1>

    <p class="tagline">
        Sign Up For Free!
    </p>

    <br>

    <button id="googleBtn" style="
        background:#a00000;
        color:white;
        border:none;
        padding:12px 20px;
        border-radius:10px;
        cursor:pointer;
        width:100%;
        max-width:300px;
    ">
        Continue with Google
    </button>

    <br><br>

    <p>or</p>

    <br>

    <input
        type="email"
        id="email"
        placeholder="Email"
        style="
            width:100%;
            max-width:300px;
            padding:12px;
            margin-bottom:10px;
        "
    >

    <br>

    <input
        type="password"
        id="password"
        placeholder="Password"
        style="
            width:100%;
            max-width:300px;
            padding:12px;
        "
    >

    <br><br>

    <button id="signupBtn" style="
        background:#a00000;
        color:white;
        border:none;
        padding:12px 20px;
        border-radius:10px;
        cursor:pointer;
        width:100%;
        max-width:300px;
    ">
        Create Account
    </button>

</div>
```

<div id="homepage" style="display:none;">

  <div style="display:flex; min-height:100vh;">

    <!-- Sidebar -->
    <div style="
      width:250px;
      background:#fff;
      border-right:1px solid #ddd;
      padding:20px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    ">

      <div>
        <h2>AdviceRer</h2>
        <br>

        <button id="settingsBtn" style="
          width:100%;
          padding:10px;
          border:none;
          border-radius:8px;
          cursor:pointer;
        ">
          Settings
        </button>
      </div>

      <div id="userInfo">
        Signed in
      </div>

    </div>

    <!-- Main Content -->
    <div style="
      flex:1;
      padding:40px;
    ">

      <h1>AdviceRer</h1>

      <p>
        Welcome back!
      </p>

      <br>

      <p>
        Use the chat button in the corner to start talking.
      </p>

    </div>

  </div>

</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBe5cznf4e-AMKRX2k7qJpA8ru1S7jPmOk",
  authDomain: "advicerer.firebaseapp.com",
  projectId: "advicerer",
  storageBucket: "advicerer.firebasestorage.app",
  messagingSenderId: "927744916100",
  appId: "1:927744916100:web:ee8412ffe0a8491276e0d1"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.getElementById("googleBtn").addEventListener("click", async () => {
  try {
    const provider = new GoogleAuthProvider();
    const result = await signInWithPopup(auth, provider);

document.getElementById("login-screen").style.display = "none";

document.getElementById("homepage").style.display = "block";

document.getElementById("userInfo").innerHTML =
`
<div>
  <strong>${result.user.displayName}</strong><br>
  ${result.user.email}
</div>
`;a
  } catch (error) {
    alert(error.message);
  }
});
</script>

</html>
