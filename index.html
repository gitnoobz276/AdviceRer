<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdviceRer</title>
<link rel="icon" type="image/png" href="favicon.png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#ffffff,#ffd6d6,#ffb8b8);min-height:100vh}
.container{max-width:800px;margin:40px auto;padding:20px}
.card{background:rgba(255,255,255,.95);padding:40px;border-radius:20px;text-align:center}
input,button{padding:12px;margin:8px 0;width:100%;max-width:320px}
#homepage{display:none;height:100vh}
.sidebar{
  width:260px;
  background:rgba(255,255,255,0.95);
  backdrop-filter:blur(12px);
  border-right:1px solid rgba(0,0,0,0.08);
  padding:20px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

.main{
  flex:1;
  padding:40px;
}

@media (max-width: 768px) {

  #menuBtn {
    display:block !important;
  }

  #sidebar {
    position: fixed;
    left: -260px;
    top: 0;
    height: 100%;
    z-index: 9999;
    transition: 0.3s;
  }

  #sidebar.open {
    left: 0;
  }

}

.dark-mode{
  background:#1e1e1e !important;
  color:white !important;
}

.dark-mode .card{
  background:#2a2a2a !important;
  color:white !important;
}

.dark-mode .sidebar{
  background:#2a2a2a !important;
  color:white !important;
}

.dark-mode button{
  background:#505050;
  color:white;
}

.setting-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 0;
  border-bottom:1px solid #eee;
  font-size:16px;
}

.setting-row:last-child{
  border-bottom:none;
}

.primary-btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#a00000;
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:.2s;
}

.primary-btn:hover{
  transform:translateY(-1px);
}

#settingsModal > div{
  background:white;
  border-radius:20px;
  padding:25px;
  box-shadow:0 10px 30px rgba(0,0,0,.15);
}

</style>
</head>
<body>

<div id="login-screen" class="container">
  <div class="card">
    <h1>AdviceRer</h1>
    <p>Sign Up For Free!</p><br>

    <button id="googleBtn">Continue with Google</button>

    <p>or</p>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button id="signupBtn">Create Account</button>
  </div>
</div>

<div id="homepage">
  <div style="display:flex;height:100vh">
    <div class="sidebar" id="sidebar">
      <div>
        <h2>AdviceRer</h2><br>
        <button id="settingsBtn" style="
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#ffe5e5;
color:#a00000;
font-weight:bold;
cursor:pointer;
transition:.2s;
">
⚙️ Settings
</button>
      </div>
      <div id="userInfo" style="
padding:12px;
background:#fff3f3;
border-radius:12px;
font-size:14px;
">
Signed in
</div>
    </div>
    <div class="main">
      <h1>AdviceRer</h1>
      <p>Welcome back!</p>
      <br>
      <p>Use the chat button in the corner to start talking.</p>
    </div>
  </div>
</div>

<button id="menuBtn" style="
display:none;
padding:10px;
border:none;
border-radius:10px;
margin-bottom:20px;
cursor:pointer;
font-size:20px;
">
☰
</button>

<!-- Settings Modal -->
<div id="settingsModal" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
z-index:10000;
">

  <div style="
  background:white;
  width:90%;
  max-width:400px;
  margin:100px auto;
  padding:25px;
  border-radius:20px;
  ">

<h2 style="margin-bottom:20px;">⚙️ Settings</h2>

<div class="setting-row">
  <span>🎤 Microphone Access</span>
  <input type="checkbox" id="micToggle">
</div>

<div class="setting-row">
  <span>🖼️ Image Generation</span>
  <input type="checkbox" id="imageToggle">
</div>

<div class="setting-row">
  <span>🌙 Dark Mode</span>
  <input type="checkbox" id="darkToggle">
</div>

<br>

<button id="closeSettings" class="primary-btn">
  Close
</button>

  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  createUserWithEmailAndPassword,
  sendEmailVerification,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBe5cznf4e-AMKRX2k7qJpA8ru1S7jPmOk",
  authDomain: "advicerer.firebaseapp.com",
  projectId: "advicerer",
  storageBucket: "advicerer.firebasestorage.app",
  messagingSenderId: "927744916100",
  appId: "1:927744916100:web:ee8412ffe0a8491276e0d1"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

function loadBotpress() {
  if (window.botpressLoaded) return;

  window.botpressLoaded = true;

  const script1 = document.createElement("script");
  script1.src = "https://cdn.botpress.cloud/webchat/v3.6/inject.js";

  const script2 = document.createElement("script");
  script2.src =
    "https://files.bpcontent.cloud/2026/05/30/04/20260530045144-SCCAU2ZI.js";

  document.body.appendChild(script1);

  script1.onload = () => {
    document.body.appendChild(script2);
  };
}

function showHomepage(user){
  document.getElementById("login-screen").style.display="none";
  document.getElementById("homepage").style.display="block";
  document.getElementById("userInfo").textContent =
    user.displayName || user.email || "User";
}

document.getElementById("googleBtn").addEventListener("click", async ()=>{
  const provider = new GoogleAuthProvider();
  const result = await signInWithPopup(auth, provider);
  showHomepage(result.user);

loadBotpress();
});

document.getElementById("signupBtn").addEventListener("click", async ()=>{
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const cred = await createUserWithEmailAndPassword(auth,email,password);
  await sendEmailVerification(cred.user);

  alert("Verification email sent. Verify your email, then sign in again.");
});

onAuthStateChanged(auth, async (user)=>{
  if(user){
    await user.reload();
    if(user.providerData.some(p=>p.providerId==="google.com") || user.emailVerified){
      showHomepage(user);
    }
  }
});

document.getElementById("settingsBtn").addEventListener("click", () => {
  document.getElementById("settingsModal").style.display = "block";
});

document.getElementById("closeSettings").addEventListener("click", () => {
  document.getElementById("settingsModal").style.display = "none";
});

document.getElementById("menuBtn").addEventListener("click", () => {

  document
    .getElementById("sidebar")
    .classList.toggle("open");

});

// Load saved settings
const savedMic = localStorage.getItem("micEnabled");
const savedImage = localStorage.getItem("imageEnabled");

if(savedMic === "true"){
  document.getElementById("micToggle").checked = true;
}

if(savedImage === "true"){
  document.getElementById("imageToggle").checked = true;
}

// Save microphone setting
document.getElementById("micToggle").addEventListener("change", () => {

  localStorage.setItem(
    "micEnabled",
    document.getElementById("micToggle").checked
  );

});

// Save image generation setting
document.getElementById("imageToggle").addEventListener("change", () => {

  localStorage.setItem(
    "imageEnabled",
    document.getElementById("imageToggle").checked
  );

});

// Load saved dark mode
const savedDark = localStorage.getItem("darkMode");

if(savedDark === "true"){
  document.body.classList.add("dark-mode");
  document.getElementById("darkToggle").checked = true;
}

// Save dark mode
document.getElementById("darkToggle").addEventListener("change", () => {

  if(document.getElementById("darkToggle").checked){

    document.body.classList.add("dark-mode");
    localStorage.setItem("darkMode","true");

  } else {

    document.body.classList.remove("dark-mode");
    localStorage.setItem("darkMode","false");

  }

});

</script>

</body>
</html>
