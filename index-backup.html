<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AdviceRer</title>

<!-- Favicon -->
<link rel="icon" type="image/png" href="favicon.png">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    min-height: 100vh;
    background: linear-gradient(
        135deg,
        #ffffff,
        #ffd6d6,
        #ffb8b8
    );
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.container {
    width: 100%;
    max-width: 800px;
}

.card {
    background: rgba(255,255,255,0.9);
    border-radius: 20px;
    padding: 40px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

h1 {
    color: #a00000;
    font-size: 3rem;
    margin-bottom: 10px;
}

.tagline {
    font-size: 1.3rem;
    color: #555;
    margin-bottom: 30px;
}

.description {
    font-size: 1.1rem;
    line-height: 1.7;
    color: #333;
}

.highlight {
    color: #a00000;
    font-weight: bold;
}

.note {
    margin-top: 25px;
    padding: 15px;
    background: #fff3f3;
    border-radius: 12px;
}

footer {
    margin-top: 25px;
    color: #666;
    font-size: 0.9rem;
}

@media (max-width: 600px) {
    h1 {
        font-size: 2.2rem;
    }

    .card {
        padding: 25px;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="card">

        <h1>AdviceRer</h1>

        <p class="tagline">
            Small Advice, Big Change.
        </p>

        <p class="description">
            Welcome to <span class="highlight">AdviceRer</span>,
            a supportive AI created to help children dealing with
            bullying, friendship problems, and difficult situations.
        </p>

        <div class="note">
            💬 Click the chat button in the bottom-right corner to start talking.
        </div>

        <footer>
            © 2026 AdviceRer
        </footer>

    </div>

</div>

<!-- Botpress Chatbot -->
<script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>
<script src="https://files.bpcontent.cloud/2026/05/30/04/20260530045144-SCCAU2ZI.js" defer></script>

</body>
</html>
